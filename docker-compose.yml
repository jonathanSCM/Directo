services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inmobiliaria}
      POSTGRES_USER: ${POSTGRES_USER:-inmobiliaria_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Inmo_app_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./apps/api/prisma/migrations/manual/add_amenities.sql:/docker-entrypoint-initdb.d/01a-amenities.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./database/migrations/001_visit_availability.sql:/docker-entrypoint-initdb.d/03-m001.sql
      - ./database/migrations/002_payments_gateway.sql:/docker-entrypoint-initdb.d/04-m002.sql
      - ./database/migrations/003_notification_promotion.sql:/docker-entrypoint-initdb.d/05-m003.sql
      - ./database/migrations/004_directo_changes.sql:/docker-entrypoint-initdb.d/06-m004.sql
      - ./database/migrations/005_google_oauth.sql:/docker-entrypoint-initdb.d/07-m005.sql
      - ./apps/api/prisma/migrations/manual/add_favorites.sql:/docker-entrypoint-initdb.d/08-favorites.sql
      - ./apps/api/prisma/migrations/manual/add_support_chat.sql:/docker-entrypoint-initdb.d/09-support.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inmobiliaria_app} -d ${POSTGRES_DB:-inmobiliaria}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-inmobiliaria_app}:${POSTGRES_PASSWORD:-Inmo_app_2026}@db:5432/${POSTGRES_DB:-inmobiliaria}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_access}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh}
      JWT_REFRESH_TTL: 7d
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GEOCODING_REGION: bo
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      PAYMENTS_WEBHOOK_SECRET: ${PAYMENTS_WEBHOOK_SECRET:-webhook_secret_change_me}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${API_PORT:-3000}:3000"

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${ADMIN_PORT:-8080}:80"

  web:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8081}:80"

volumes:
  pgdata:
  uploads:
